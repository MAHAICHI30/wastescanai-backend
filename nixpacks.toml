[phases.setup]
nixPkgs = ["python311", "python311Packages.pip", "libglvnd", "libGL"]

[phases.install]
cmds = ["pip install --upgrade pip", "pip install -r requirements.txt"]

[phases.deploy]
cmds = ["gunicorn app:app --bind 0.0.0.0:$PORT --timeout 120"]

[start]
cmd = "gunicorn app:app --bind 0.0.0.0:$PORT --timeout 120"
